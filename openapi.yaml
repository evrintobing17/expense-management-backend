openapi: 3.0.3
info:
  title: Expense Management Backend API
  version: 1.0.0
  description: API specification generated from current Go handlers and router configuration.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
  - name: Health
  - name: Expenses
  - name: Manager

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      description: Authenticates user credentials and returns a bearer token with user profile data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request body
          content:
            text/plain:
              schema:
                type: string
                example: Invalid request body
        '401':
          description: Invalid credentials
          content:
            text/plain:
              schema:
                type: string
                example: Invalid credentials

  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: Verifies application can connect to database.
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Database connection failed
          content:
            text/plain:
              schema:
                type: string
                example: Database connection failed

  /api/expenses:
    post:
      tags: [Expenses]
      summary: Create expense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          description: Invalid payload or domain validation failed
          content:
            text/plain:
              schema:
                type: string
                examples:
                  invalidBody:
                    value: Invalid request body
                  invalidAmount:
                    value: amount must be between 10,000 and 50,000,000 IDR
                  missingDescription:
                    value: description is required
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

    get:
      tags: [Expenses]
      summary: Get user expenses
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/ExpenseStatus'
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: List of expenses for authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

  /api/expenses/{id}:
    get:
      tags: [Expenses]
      summary: Get expense by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Expense found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          description: Invalid expense id format
          content:
            text/plain:
              schema:
                type: string
                example: Invalid expense ID
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '404':
          description: Expense not found
          content:
            text/plain:
              schema:
                type: string
                example: Expense not found
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

  /api/expenses/{id}/approve:
    put:
      tags: [Manager]
      summary: Approve expense
      description: Manager-only endpoint.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        '200':
          description: Expense approved
        '400':
          description: Invalid payload or expense cannot be approved
          content:
            text/plain:
              schema:
                type: string
                examples:
                  invalidBody:
                    value: Invalid request body
                  invalidID:
                    value: Invalid expense ID
                  invalidState:
                    value: Expense cannot be approved
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '403':
          description: Only managers can approve expenses
          content:
            text/plain:
              schema:
                type: string
                example: Only managers can approve expenses
        '404':
          description: Expense not found
          content:
            text/plain:
              schema:
                type: string
                example: Expense not found
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

  /api/expenses/{id}/reject:
    put:
      tags: [Manager]
      summary: Reject expense
      description: Manager-only endpoint.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        '200':
          description: Expense rejected
        '400':
          description: Invalid payload or expense cannot be rejected
          content:
            text/plain:
              schema:
                type: string
                examples:
                  invalidBody:
                    value: Invalid request body
                  invalidID:
                    value: Invalid expense ID
                  invalidState:
                    value: Expense cannot be rejected
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '403':
          description: Only managers can reject expenses
          content:
            text/plain:
              schema:
                type: string
                example: Only managers can reject expenses
        '404':
          description: Expense not found
          content:
            text/plain:
              schema:
                type: string
                example: Expense not found
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

  /api/expenses-pending:
    get:
      tags: [Manager]
      summary: Get pending approval expenses
      description: Manager-only endpoint.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending expenses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: Unauthorized
        '403':
          description: Access denied for non-manager users
          content:
            text/plain:
              schema:
                type: string
                example: Access denied. Manager role required.
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Internal server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    UserRole:
      type: string
      enum: [employee, manager]

    UserResponse:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    CreateExpenseRequest:
      type: object
      required: [amount_idr, description, receipt_url]
      properties:
        amount_idr:
          type: integer
          minimum: 10000
          maximum: 50000000
        description:
          type: string
        receipt_url:
          type: string

    ApprovalActionRequest:
      type: object
      properties:
        notes:
          type: string

    ExpenseStatus:
      type: string
      enum:
        - pending
        - awaiting_approval
        - approved
        - rejected
        - auto_approved
        - processing
        - completed
        - failed

    Expense:
      type: object
      required:
        - id
        - user_id
        - amount_idr
        - description
        - receipt_url
        - status
        - submitted_at
        - requires_approval
        - auto_approved
      properties:
        id:
          type: integer
        user_id:
          type: integer
        amount_idr:
          type: integer
        description:
          type: string
        receipt_url:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatus'
        submitted_at:
          type: string
          format: date-time
        processed_at:
          type: string
          format: date-time
          nullable: true
        requires_approval:
          type: boolean
        auto_approved:
          type: boolean

    HealthResponse:
      type: object
      required: [status, database]
      properties:
        status:
          type: string
          example: ok
        database:
          type: string
          example: connected
